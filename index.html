<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Mirror for SanMao Yang</title>
<style>
  :root {
    --bg: #faf9f6;
    --ink: #141413;
    --sub: #8a8a85;
    --accent: #cc785c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Courier New", monospace;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
  }

  svg { shape-rendering: crispEdges; }

  header {
    text-align: center;
    margin-bottom: 30px;
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 6px;
  }

  main {
    position: relative;
    width: 100%;
    max-width: 960px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage {
    position: relative;
    width: 640px;
    height: 440px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene {
    width: 380px;
    height: 320px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }

  .pose {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 0.35s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pose.active { opacity: 1; }
  .pose svg { width: 100%; height: 100%; }

  .pose.active svg { animation: idle 2.4s steps(1) infinite; }
  @keyframes idle {
    0%, 50% { transform: translateY(0); }
    50.01%, 100% { transform: translateY(-6px); }
  }

  .pose-executor.active svg { animation: twitch 1.2s steps(1) infinite; }
  @keyframes twitch {
    0%, 40%, 60%, 100% { transform: translateY(0); }
    45% { transform: translateY(-2px); }
    55% { transform: translateY(1px); }
  }

  .pose-soul.active svg { animation: dreamy 3s ease-in-out infinite; }
  @keyframes dreamy {
    0%, 100% { transform: rotate(-2deg) translateY(0); }
    50% { transform: rotate(2deg) translateY(-4px); }
  }

  .pose-defender.active svg { animation: peek 2s ease-in-out infinite; }
  @keyframes peek {
    0%, 100% { transform: translateX(-3px); }
    50% { transform: translateX(3px); }
  }

  .pose-censor.active svg { animation: shake 2s ease-in-out infinite; }
  @keyframes shake {
    0%, 100% { transform: rotate(0); }
    25% { transform: rotate(-3deg); }
    75% { transform: rotate(3deg); }
  }

  .pose-action.active svg { animation: dash 0.8s ease-in-out infinite; }
  @keyframes dash {
    0%, 100% { transform: translateX(-8px); }
    50% { transform: translateX(8px); }
  }

  .shadow {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 170px;
    height: 8px;
    background: var(--ink);
    opacity: 0.12;
    animation: shadowPulse 2.4s steps(1) infinite;
    z-index: 1;
  }
  @keyframes shadowPulse {
    0%, 50% { transform: translateX(-50%) scaleX(1); opacity: 0.12; }
    50.01%, 100% { transform: translateX(-50%) scaleX(0.85); opacity: 0.08; }
  }

  .trait {
    position: absolute;
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s;
    z-index: 3;
    border-radius: 50%;
    background: var(--bg);
  }
  .trait svg { width: 36px; height: 36px; }
  .trait:hover { transform: scale(1.15); }
  .trait.active { background: var(--ink); }
  .trait.active svg g { fill: var(--bg) !important; }
  .trait.strength.active { background: var(--accent); }

  .trait-1 { top: 4%;  left: 2%; }
  .trait-2 { top: 4%;  right: 2%; }
  .trait-3 { top: 50%; left: 0;  transform: translateY(-50%); }
  .trait-3:hover { transform: translateY(-50%) scale(1.15); }
  .trait-4 { top: 50%; right: 0; transform: translateY(-50%); }
  .trait-4:hover { transform: translateY(-50%) scale(1.15); }
  .trait-5 { bottom: 4%; left: 50%; transform: translateX(-50%); }
  .trait-5:hover { transform: translateX(-50%) scale(1.15); }

  /* tooltip */
  .tip {
    position: absolute;
    left: 50%;
    top: 100%;
    transform: translate(-50%, 8px);
    background: var(--ink);
    color: var(--bg);
    padding: 4px 10px;
    font-size: 10px;
    letter-spacing: 3px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    font-weight: 700;
  }
  .trait:hover .tip { opacity: 1; }
  .trait.strength .tip { background: var(--accent); }

  /* 特殊方向：左右两侧的按钮 tooltip 在下方时需翻转 */
  .trait-3 .tip, .trait-4 .tip { top: auto; bottom: 100%; transform: translate(-50%, -8px); }
  .trait-5 .tip { top: auto; bottom: 100%; transform: translate(-50%, -8px); }

  /* 眨眼 */
  .blink { animation: blinkCycle 4s steps(1) infinite; }
  @keyframes blinkCycle {
    0%, 96% { opacity: 1; }
    96.01%, 100% { opacity: 0; }
  }
  .blink-inv { animation: blinkInv 4s steps(1) infinite; }
  @keyframes blinkInv {
    0%, 96% { opacity: 0; }
    96.01%, 100% { opacity: 1; }
  }

  .glow-heart { animation: glowPulse 0.8s ease-in-out infinite; transform-origin: center; }
  @keyframes glowPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.5); }
  }

  .moon-wobble { animation: moonWobble 4s ease-in-out infinite; transform-origin: center; }
  @keyframes moonWobble {
    0%,100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  .motion-flash { animation: flash 0.4s steps(1) infinite; }
  @keyframes flash { 0%,50%{opacity:1;} 50.01%,100%{opacity:0.3;} }
</style>
</head>

<script>
  const traits = document.querySelectorAll('.trait');
  const poses = document.querySelectorAll('.pose');

  function setPose(key) {
    poses.forEach(p => p.classList.toggle('active', p.dataset.pose === key));
  }

  traits.forEach(t => {
    t.addEventListener('mouseenter', () => {
      traits.forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      setPose(t.dataset.target);
    });
    t.addEventListener('mouseleave', () => {
      t.classList.remove('active');
      setPose('idle');
    });
    t.addEventListener('click', () => {
      traits.forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      setPose(t.dataset.target);
    });
  });
</script>

</body>
